<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="common.suiteName">Aviation Calculators Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="shared-config.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".app-version").forEach(function (el) {
          el.textContent = "v" + (window.APP_VERSION || "?");
        });
      });
    </script>
    <link rel="stylesheet" href="dark-mode.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Phase 4.3 — distinctive typography -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap"
    />
    <script src="i18n/i18n.js"></script>
    <style>
      /* Phase 2.3 — Active item: instrument-tab gradient + icon glow */
      .sidebar-item.active {
        background: linear-gradient(
          to right,
          rgba(56, 189, 248, 0.22),
          rgba(56, 189, 248, 0.04)
        );
        color: #e0f7ff;
        border-left: 3px solid #38bdf8;
      }
      .sidebar-item.active i,
      .sidebar-item.active svg {
        color: #38bdf8 !important;
        filter: drop-shadow(0 0 4px rgba(56, 189, 248, 0.7));
        transform: scale(1.08);
      }
      .dark .sidebar-item.active {
        background: linear-gradient(
          to right,
          rgba(56, 189, 248, 0.25),
          rgba(56, 189, 248, 0.05)
        );
        color: #e0f7ff;
        border-left: 3px solid #38bdf8;
      }

      /* Iframe initial bg — matches Phase 1 card dark token */
      .dark iframe {
        background-color: #1a2235;
      }

      /* Phase 10 — smooth cross-fade when switching tools (fix #37) */
      iframe {
        transition: opacity 0.2s ease-in-out;
        /* Paint the iframe chrome with the page bg so the blank-document
           moment between src swap and first paint is invisible */
        background-color: var(--bg, #f1f5f9);
      }
      iframe.loading {
        opacity: 0;
      }
      /* Give the wrapper a matching bg so no white flash bleeds through */
      #iframe-wrapper {
        background-color: var(--bg, #f1f5f9);
      }
      html.dark iframe,
      html.dark #iframe-wrapper {
        background-color: var(--bg); /* resolves to #0a0f1a in dark */
      }

      /* Sidebar scrollbar styling (visible but subtle) */
      #sidebar {
        scrollbar-width: thin; /* Firefox */
        scrollbar-color: #334155 transparent; /* thumb, track */
      }
      #sidebar::-webkit-scrollbar {
        width: 10px;
      }
      #sidebar::-webkit-scrollbar-track {
        background: transparent;
      }
      #sidebar::-webkit-scrollbar-thumb {
        background-color: #334155; /* slate-700 */
        border-radius: 8px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      .dark #sidebar::-webkit-scrollbar-thumb {
        background-color: #475569; /* slate-600 */
      }

      /* Keyboard focus and hover polish for sidebar items */
      .sidebar-item {
        outline: none;
      }
      .sidebar-item:focus-visible {
        box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.6) inset; /* primary-400 */
        border-radius: 0.5rem;
      }
      .sidebar-item:hover {
        background-color: rgba(56, 189, 248, 0.08); /* primary-400 at ~8% */
      }
      .sidebar-item i,
      .sidebar-item svg {
        transition:
          color 0.15s ease-in-out,
          transform 0.12s ease-in-out;
      }
      .sidebar-item:hover i,
      .sidebar-item:hover svg {
        color: #7dd3fc; /* primary-300 */
      }
      .sidebar-item:active i,
      .sidebar-item:active svg {
        transform: translateY(0.5px);
      }

      /* Limit long item labels to 2 lines for tidy rhythm */
      .sidebar-item span[data-i18n] {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        line-clamp: 2; /* standard property for future support */
        overflow: hidden;
        white-space: normal;
        line-height: 1.2;
      }

      /* Phase 2.4 — Section headers: dot accent + bottom border */
      .section-header {
        position: sticky;
        top: 0;
        z-index: 5;
        backdrop-filter: saturate(120%) blur(6px);
        -webkit-backdrop-filter: saturate(120%) blur(6px);
        border-bottom: 1px solid rgba(30, 58, 95, 0.6);
      }
      .section-header .label {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding-top: 0.25rem;
        padding-bottom: 0.25rem;
      }
      .section-header .label::before {
        content: "";
        display: inline-block;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #38bdf8;
        box-shadow: 0 0 5px rgba(56, 189, 248, 0.8);
        flex-shrink: 0;
      }

      /* Scroll shadows for sidebar to hint overflow */
      #sidebar {
        position: relative;
      }
      #sidebar::before,
      #sidebar::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        height: 12px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s ease-in-out;
      }
      #sidebar::before {
        top: 0;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.22),
          rgba(0, 0, 0, 0)
        );
      }
      #sidebar::after {
        bottom: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.22),
          rgba(0, 0, 0, 0)
        );
      }
      #sidebar.shadow-top::before {
        opacity: 1;
      }
      #sidebar.shadow-bottom::after {
        opacity: 1;
      }

      /* Improved mobile sidebar styles */
      @media (max-width: 768px) {
        .sidebar-closed {
          transform: translateX(-100%);
        }

        .sidebar-overlay {
          background-color: rgba(0, 0, 0, 0.5);
          transition: opacity 0.3s ease-in-out;
        }

        .sidebar-overlay.hidden {
          opacity: 0;
          pointer-events: none;
        }
      }

      /* Enhanced touch styles for tablet devices */
      @media (hover: none) and (pointer: coarse) {
        /* Larger touch targets for buttons */
        button,
        .sidebar-item {
          min-height: 48px;
          padding: 12px !important;
        }

        /* Increase spacing between sidebar items */
        .sidebar-item {
          margin-bottom: 8px;
        }

        /* Larger toggle for dark mode */
        #darkModeIndicator {
          width: 24px !important;
          height: 24px !important;
        }

        /* Larger container for dark mode toggle */
        #darkModeToggle .relative {
          width: 48px !important;
          height: 24px !important;
        }

        /* Prevent accidental text selection on touch */
        * {
          -webkit-tap-highlight-color: transparent;
          -webkit-touch-callout: none;
        }

        /* Add visible active state for touch feedback */
        button:active,
        .sidebar-item:active {
          transform: scale(0.98);
          transition: transform 0.1s;
        }
      }

      /* Swipe gesture support */
      .swipe-area {
        position: fixed;
        top: 0;
        left: 0;
        width: 20px;
        height: 100%;
        z-index: 15;
      }

      /* Phase 4.3 — typography */
      body {
        font-family: "Barlow", sans-serif;
      }
      button,
      input,
      select,
      label {
        font-family: "Barlow", sans-serif;
      }
      /* App name + section headers → Rajdhani technical condensed */
      #sidebar .text-lg.font-semibold {
        font-family: "Rajdhani", sans-serif;
        font-weight: 700;
        letter-spacing: 0.03em;
        font-size: 1.1rem;
      }
      .section-header .label {
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        letter-spacing: 0.08em;
      }

      /* Phase 2.2 — Sidebar: deep navy aviation console background */
      .sidebar-nav {
        background-color: #0d1424;
        border-right-color: #1e3a5f !important;
      }
      .section-header {
        background-color: rgba(13, 20, 36, 0.9) !important;
      }
      /* Override Tailwind gray-700 hover inside sidebar to match navy palette */
      .sidebar-nav .hover\:bg-gray-700:hover {
        background-color: rgba(56, 189, 248, 0.08) !important;
      }

      /* Phase 2.5 — Desktop topbar */
      #topbar {
        background-color: #0d1424;
        border-bottom: 1px solid #1e3a5f;
        flex-shrink: 0;
      }

      /* =====================================================
         Phase 10 — Collapsible Sidebar Rail
         ===================================================== */

      /* 10.1 — Smooth width transition */
      #sidebar {
        transition: width 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: width;
      }

      /* When in rail mode: 56px icon-only rail */
      #sidebar.rail {
        width: 56px !important;
        min-width: 56px;
        overflow: visible; /* allow tooltip to escape clip */
      }

      /* Rail: hide label text, keep icon visible */
      #sidebar.rail .sidebar-label {
        opacity: 0;
        max-width: 0;
        overflow: hidden;
        pointer-events: none;
        transition:
          opacity 0.18s ease,
          max-width 0.18s ease;
      }
      #sidebar.rail .section-header .label-text {
        display: none;
      }
      #sidebar.rail .section-header .section-chevron {
        display: none;
      }
      #sidebar.rail .section-header .label::before {
        display: none;
      }
      #sidebar.rail .section-header {
        justify-content: center;
        padding-left: 0;
        padding-right: 0;
      }

      /* Phase 7 — Sub-section labels inside Calculators group */
      .sub-section-label {
        padding: 6px 12px 2px 20px;
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #4b6480;
        display: flex;
        align-items: center;
        gap: 6px;
        pointer-events: none;
        user-select: none;
      }
      .sub-section-label::before {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(56, 189, 248, 0.12);
      }
      /* Hide label text in rail mode; keep the divider line */
      #sidebar.rail .sub-section-label span {
        display: none;
      }
      #sidebar.rail .sub-section-label {
        padding: 6px 0 2px;
        justify-content: center;
      }

      /* Rail: centre items, kill text-related margins */
      #sidebar.rail .sidebar-item {
        justify-content: center !important;
        padding: 0.75rem 0 !important;
      }
      #sidebar.rail .sidebar-item i,
      #sidebar.rail .sidebar-item svg.sidebar-icon {
        margin-right: 0 !important;
      }

      /* Rail: hide brand text, centre compass */
      #sidebar.rail .brand-text {
        display: none;
      }
      #sidebar.rail #sidebarBrand {
        justify-content: center !important;
      }

      /* Rail: hide footer labels + toggles that don't make sense */
      #sidebar.rail .rail-hide {
        display: none !important;
      }
      #sidebar.rail .sidebar-footer-icon {
        margin-right: 0 !important;
      }

      /* Rail mode — fix footer clickability: full-width centred icons */
      #sidebar.rail .sidebar-footer {
        padding-left: 0 !important;
        padding-right: 0 !important;
      }
      #sidebar.rail #darkModeToggle,
      #sidebar.rail .language-row {
        justify-content: center;
        padding-left: 0;
        padding-right: 0;
      }
      /* Tooltip for footer items in rail mode */
      #sidebar.rail #darkModeToggle,
      #sidebar.rail .language-row {
        position: relative;
        overflow: visible;
      }
      #sidebar.rail #darkModeToggle::after,
      #sidebar.rail .language-row::after {
        content: attr(data-label);
        position: absolute;
        left: calc(100% + 12px);
        top: 50%;
        transform: translateY(-50%);
        background: #0d1424;
        border: 1px solid #1e3a5f;
        color: #e0f7ff;
        font-family: "Barlow", sans-serif;
        font-size: 0.78rem;
        white-space: nowrap;
        padding: 0.3rem 0.7rem;
        border-radius: 6px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.12s ease;
        z-index: 200;
      }
      #sidebar.rail #darkModeToggle:hover::after,
      #sidebar.rail .language-row:hover::after {
        opacity: 1;
      }
      /* Allow tooltips to escape sidebar in rail mode */
      #sidebar.rail {
        overflow-y: auto;
        overflow-x: visible;
      }

      /* Non-rail: show labels with transition */
      .sidebar-label {
        opacity: 1;
        max-width: 200px;
        overflow: hidden;
        white-space: nowrap;
        transition:
          opacity 0.18s ease 0.05s,
          max-width 0.22s ease;
      }

      /* 10.2 — Rail hover tooltip */
      #sidebar.rail .sidebar-item {
        position: relative;
        overflow: visible;
      }
      #sidebar.rail .sidebar-item::after {
        content: attr(data-label);
        position: absolute;
        left: calc(100% + 12px);
        top: 50%;
        transform: translateY(-50%);
        background: #0d1424;
        border: 1px solid #1e3a5f;
        color: #e0f7ff;
        font-family: "Barlow", sans-serif;
        font-size: 0.78rem;
        white-space: nowrap;
        padding: 0.3rem 0.7rem;
        border-radius: 6px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.12s ease;
        z-index: 200;
      }
      #sidebar.rail .sidebar-item:hover::after {
        opacity: 1;
      }

      /* 10.3 — Section group accordion */
      .section-header {
        cursor: pointer;
        display: flex !important;
        align-items: center;
        justify-content: space-between;
        user-select: none;
      }
      .section-chevron {
        width: 12px;
        height: 12px;
        color: #64748b;
        flex-shrink: 0;
        transition: transform 0.22s ease;
      }
      .section-header.collapsed .section-chevron {
        transform: rotate(-90deg);
      }
      .section-group {
        overflow: hidden;
        max-height: 1200px;
        transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .section-group.collapsed {
        max-height: 0;
      }

      /* 10.4 — Upgraded active item glow bar (replaces border-left) */
      .sidebar-item {
        position: relative;
        border-left: none !important;
      }
      .sidebar-item.active {
        background: linear-gradient(
          to right,
          rgba(56, 189, 248, 0.18),
          rgba(56, 189, 248, 0.04)
        ) !important;
        border-left: none !important;
        color: #e0f7ff;
      }
      .sidebar-item.active::before {
        content: "";
        position: absolute;
        left: 0;
        top: 20%;
        bottom: 20%;
        width: 3px;
        background: #38bdf8;
        border-radius: 0 2px 2px 0;
        box-shadow:
          0 0 8px rgba(56, 189, 248, 0.8),
          0 0 16px rgba(56, 189, 248, 0.35);
      }
      /* Rail mode active: bottom dot indicator */
      #sidebar.rail .sidebar-item.active::before {
        top: auto;
        bottom: 4px;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        width: 16px;
        height: 3px;
        border-radius: 2px;
      }

      /* 10.5 — Topbar sidebar collapse button */
      #sidebarCollapseBtn {
        display: none; /* shown via md:flex override below */
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 6px;
        color: #64748b;
        background: transparent;
        border: none;
        cursor: pointer;
        flex-shrink: 0;
        margin-right: 12px;
        transition:
          color 0.15s ease,
          background 0.15s ease;
      }
      #sidebarCollapseBtn:hover {
        color: #38bdf8;
        background: rgba(56, 189, 248, 0.1);
      }
      @media (min-width: 768px) {
        #sidebarCollapseBtn {
          display: flex;
        }
      }
      #sidebarCollapseBtn .chevron-icon {
        transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #sidebar.rail ~ .flex-1 #sidebarCollapseBtn .chevron-icon,
      .rail-collapsed #sidebarCollapseBtn .chevron-icon {
        transform: rotate(180deg);
      }
      /* END PHASE 10 */
    </style>
  </head>
  <body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white">
    <!-- Swipe area for opening sidebar with gesture -->
    <div id="swipeArea" class="swipe-area md:hidden"></div>

    <!-- Mobile Sidebar Overlay -->
    <div
      id="sidebarOverlay"
      class="sidebar-overlay fixed inset-0 z-20 hidden md:hidden"
      onclick="closeSidebar()"
    ></div>

    <div class="flex h-screen overflow-hidden">
      <!-- Sidebar -->
      <div
        id="sidebar"
        class="fixed md:relative z-30 sidebar-nav shadow-xl transition-all duration-300 ease-in-out flex flex-col w-64 md:w-64 h-full overflow-y-auto border-r"
      >
        <div
          class="flex items-center justify-between px-4 py-3 border-b"
          style="border-color: #1e3a5f"
        >
          <!-- Phase 2.1 / 10 — PANSOPS wordmark + compass brand mark -->
          <div id="sidebarBrand" class="flex items-center gap-3">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-9 w-9 text-primary-400 flex-shrink-0"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="9" />
              <polygon
                points="12,3 14.2,12 12,10.5 9.8,12"
                fill="#38bdf8"
                stroke="none"
              />
              <polygon
                points="12,21 9.8,12 12,13.5 14.2,12"
                fill="#38bdf8"
                stroke="none"
                opacity="0.35"
              />
              <line x1="12" y1="3" x2="12" y2="5.5" stroke-width="1.5" />
              <line x1="21" y1="12" x2="18.5" y2="12" stroke-width="1.5" />
              <line x1="12" y1="21" x2="12" y2="18.5" stroke-width="1.5" />
              <line x1="3" y1="12" x2="5.5" y2="12" stroke-width="1.5" />
            </svg>
            <div class="brand-text flex flex-col leading-none">
              <span
                class="text-white font-bold"
                style="
                  font-family: &quot;Rajdhani&quot;, sans-serif;
                  font-size: 1.15rem;
                  letter-spacing: 0.14em;
                "
                >PANSOPS</span
              >
              <span
                class="text-primary-400"
                style="
                  font-family: &quot;Barlow&quot;, sans-serif;
                  font-size: 0.63rem;
                  letter-spacing: 0.09em;
                  opacity: 0.75;
                  text-transform: uppercase;
                "
                >Calculator Suite</span
              >
              <div
                class="mt-1"
                style="
                  height: 1px;
                  background: linear-gradient(to right, #38bdf8, transparent);
                "
              ></div>
            </div>
          </div>
          <button
            id="closeSidebarBtn"
            class="md:hidden rounded-lg p-1 hover:bg-gray-700 focus:outline-none"
            onclick="closeSidebar()"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6 text-white"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>

        <div class="py-4 flex flex-col justify-between h-full">
          <nav>
            <ul class="space-y-1.5 px-2">
              <!-- Section: Calculators -->
              <li
                class="section-header px-3 mt-2 mb-1 text-[11px] uppercase tracking-wide text-gray-400 select-none"
                data-section="calculators"
              >
                <span class="label">
                  <span class="label-text" data-i18n="sections.calculators"
                    >Calculators</span
                  >
                </span>
                <svg
                  class="section-chevron"
                  viewBox="0 0 12 12"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <polyline points="2,4 6,8 10,4" />
                </svg>
              </li>
              <ul class="section-group space-y-1.5" data-for="calculators">
                <li class="sub-section-label" aria-hidden="true">
                  <span data-i18n="sections.subGeneral">General</span>
                </li>
                <li>
                  <button
                    id="isaButton"
                    data-label="ISA Deviation"
                    onclick="loadPage('ISA_deviation.html', this)"
                    class="sidebar-item active w-full flex items-center p-3 text-gray-300 rounded-lg hover:bg-gray-700 group transition-colors"
                  >
                    <i
                      class="fas fa-thermometer-half text-primary-400 text-xl w-5 h-5 mr-3 sidebar-icon"
                    ></i>
                    <span class="sidebar-label" data-i18n="isa.title"
                      >ISA Deviation Calculator</span
                    >
                  </button>
                </li>
                <li>
                  <button
                    id="tasButton"
                    data-label="True Airspeed"
                    onclick="loadPage('TAS.html', this)"
                    class="sidebar-item w-full flex items-center p-3 text-gray-300 rounded-lg hover:bg-gray-700 group transition-colors"
                  >
                    <i
                      class="fas fa-plane text-primary-400 text-xl w-5 h-5 mr-3 sidebar-icon"
                    ></i>
                    <span class="sidebar-label" data-i18n="tas.sidebarLabel"
                      >True Airspeed Calculator</span
                    >
                  </button>
                </li>
                <li>
                  <button
                    id="rateTurnButton"
                    data-label="Rate & Radius of Turn"
                    onclick="loadPage('rate_turn.html', this)"
                    class="sidebar-item w-full flex items-center p-3 text-gray-300 rounded-lg hover:bg-gray-700 group transition-colors"
                  >
                    <i
                      class="fas fa-circle-notch text-primary-400 text-xl w-5 h-5 mr-3 sidebar-icon"
                    ></i>
                    <span class="sidebar-label" data-i18n="rateTurn.title"
                      >Rate & Radius of Turn</span
                    >
                  </button>
                </li>
                <li>
                  <button
                    id="dmeButton"
                    data-label="DME Tolerance"
                    onclick="loadPage('dme_tolerance.html', this)"
                    class="sidebar-item w-full flex items-center p-3 text-gray-300 rounded-lg hover:bg-gray-700 group transition-colors"
                  >
                    <svg
                      class="text-primary-400 w-5 h-5 mr-3 sidebar-icon"
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      aria-hidden="true"
                    >
                      <circle cx="12" cy="12" r="4"></circle>
                      <circle
                        cx="12"
                        cy="12"
                        r="8"
                        stroke-dasharray="4 4"
                      ></circle>
                      <circle
                        cx="12"
                        cy="12"
                        r="12"
                        stroke-dasharray="4 4"
                      ></circle>

              supported: ["en", "es"],
              path: "i18n",
            }).catch(console.error);
          }
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", initI18n);
        } else {
          initI18n();
        }
      })();

      // Check if we're on mobile
      const isMobile = () => window.innerWidth < 768;

      // Initialize sidebar state based on screen size
      document.addEventListener("DOMContentLoaded", function () {
        if (isMobile()) {
          closeSidebar(false); // Don't animate on initial load
        }

        // Initialize touch events for swipe gestures
        initTouchEvents();
      });

      // Handle window resize
      window.addEventListener("resize", function () {
        if (isMobile()) {
          closeSidebar(false);
        } else {
          openSidebar(false);
        }
      });

      // Initialize touch events for swipe gestures
      function initTouchEvents() {
        const swipeArea = document.getElementById("swipeArea");
        const sidebar = document.getElementById("sidebar");
        let touchStartX = 0;
        let touchEndX = 0;

        // For the edge swipe to open sidebar
        swipeArea.addEventListener(
          "touchstart",
          function (e) {
            touchStartX = e.changedTouches[0].screenX;
          },
          { passive: true },
        );

        swipeArea.addEventListener(
          "touchend",
          function (e) {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipeGesture(touchStartX, touchEndX);
          },
          { passive: true },
        );

        // For swiping the sidebar closed
        sidebar.addEventListener(
          "touchstart",
          function (e) {
            touchStartX = e.changedTouches[0].screenX;
          },
          { passive: true },
        );

        sidebar.addEventListener(
          "touchend",
          function (e) {
            touchEndX = e.changedTouches[0].screenX;
            handleSidebarSwipe(touchStartX, touchEndX);
          },
          { passive: true },
        );

        // For the main content area - to detect swipes
        document.addEventListener(
          "touchstart",
          function (e) {
            touchStartX = e.changedTouches[0].screenX;
          },
          { passive: true },
        );

        document.addEventListener(
          "touchend",
          function (e) {
            touchEndX = e.changedTouches[0].screenX;
            // Only process if we're not in the sidebar or swipe area
            if (!sidebar.contains(e.target) && !swipeArea.contains(e.target)) {
              handleContentSwipe(touchStartX, touchEndX);
            }
          },
          { passive: true },
        );
      }

      // Handle swipe gesture from edge
      function handleSwipeGesture(startX, endX) {
        const swipeThreshold = 50; // Minimum distance required for a swipe

        if (endX - startX > swipeThreshold) {
          // Right swipe from left edge
          openSidebar();
        }
      }

      // Handle swipe gesture within sidebar
      function handleSidebarSwipe(startX, endX) {
        const swipeThreshold = 100; // Larger threshold for sidebar close

        if (startX - endX > swipeThreshold && isMobile()) {
          // Left swipe within sidebar
          closeSidebar();
        }
      }

      // Handle swipe gesture in content area
      function handleContentSwipe(startX, endX) {
        const swipeThreshold = 100;
        const sidebar = document.getElementById("sidebar");

        if (
          endX - startX > swipeThreshold &&
          isMobile() &&
          sidebar.classList.contains("sidebar-closed")
        ) {
          // Right swipe in content area when sidebar is closed
          openSidebar();
        } else if (
          startX - endX > swipeThreshold &&
          isMobile() &&
          !sidebar.classList.contains("sidebar-closed")
        ) {
          // Left swipe in content area when sidebar is open
          closeSidebar();
        }
      }

      // Open sidebar function
      function openSidebar(animate = true) {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebarOverlay");

        if (animate) {
          sidebar.classList.add("transition-transform");
        } else {
          sidebar.classList.remove("transition-transform");
        }

        sidebar.classList.remove("sidebar-closed");
        overlay.classList.remove("hidden");

        // Add haptic feedback if available
        if (navigator.vibrate) {
          navigator.vibrate(10);
        }
      }

      // Close sidebar function
      function closeSidebar(animate = true) {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebarOverlay");

        if (animate) {
          sidebar.classList.add("transition-transform");
        } else {
          sidebar.classList.remove("transition-transform");
        }

        if (isMobile()) {
          sidebar.classList.add("sidebar-closed");
          overlay.classList.add("hidden");

          // Add haptic feedback if available
          if (navigator.vibrate) {
            navigator.vibrate(10);
          }
        }
      }

      // Hash ↔ page mapping (4.1 hash routing)
      const PAGE_MAP = {
        "#isa": { url: "ISA_deviation.html", buttonId: "isaButton" },
        "#tas": { url: "TAS.html", buttonId: "tasButton" },
        "#rate-turn": { url: "rate_turn.html", buttonId: "rateTurnButton" },
        "#dme": { url: "dme_tolerance.html", buttonId: "dmeButton" },
        "#profile": { url: "Profile_Check.html", buttonId: "elevationButton" },
        "#npa-soc": {
          url: "NPA_SOC_Calculation.html",
          buttonId: "npaSocButton",
        },
        "#vss-ocs": { url: "VSS_OCS.html", buttonId: "vssOcsButton" },
        "#omni-sid": { url: "omni.html", buttonId: "omniSidButton" },
        "#wind-spiral": {
          url: "Wind_Spiral.html",
          buttonId: "windSpiralButton",
        },
        "#flyover": {
          url: "Flyover_Calculation.html",
          buttonId: "flyoverButton",
        },
        "#flyby": {
          url: "Flyby_Calculation.html",
          buttonId: "flybyButton",
        },
        "#msd": {
          url: "MSD_Calculation.html",
          buttonId: "msdCombinedButton",
        },
        "#circling": {
          url: "Circling_Parameters.html",
          buttonId: "circlingButton",
        },
        "#ils-height": {
          url: "ILS_height_calculations.html",
          buttonId: "ilsHeightButton",
        },
        "#ils-distance": {
          url: "ILS_distance_calculations.html",
          buttonId: "ilsDistanceButton",
        },
        "#bearings": {
          url: "bearings_angles.html",
          buttonId: "bearingsAnglesButton",
        },
        "#about": { url: "About.html", buttonId: "aboutButton" },
      };
      // Reverse lookup: url → hash
      const URL_TO_HASH = Object.fromEntries(
        Object.entries(PAGE_MAP).map(([hash, { url }]) => [url, hash]),
      );

      // Pending navigation timer — cancelled on rapid successive clicks (fix #37)
      let _navTimer = null;

      // Phase 2.5 — display names for desktop topbar breadcrumb
      const PAGE_TITLES = {
        "ISA_deviation.html": "ISA Deviation",
        "TAS.html": "True Airspeed",
        "rate_turn.html": "Rate & Radius of Turn",
        "dme_tolerance.html": "DME Tolerance",
        "Profile_Check.html": "Profile Estimator",
        "NPA_SOC_Calculation.html": "NPA SOC Calculation",
        "VSS_OCS.html": "VSS / OCS Parameters",
        "Flyover_Calculation.html": "Flyover MSD",
        "MSD_Calculation.html": "MSD Combined",
        "Circling_Parameters.html": "Circling Protection Area",
        "ILS_height_calculations.html": "ILS Height Calculations",
        "ILS_distance_calculations.html": "ILS Distance Calculations",
        "bearings_angles.html": "Bearings & Angles",
        "About.html": "About",
      };

      // Load page in iframe and update active button - OPTIMIZED
      function loadPage(pageUrl, buttonElement) {
        const iframe = document.getElementById("iframe");

        // Push hash to browser history so back/forward works
        const hash = URL_TO_HASH[pageUrl];
        if (hash && location.hash !== hash) {
          history.pushState({ pageUrl, buttonId: buttonElement.id }, "", hash);
        }

        // Save state immediately (synchronous)
        localStorage.setItem("lastPage", pageUrl);
        localStorage.setItem("lastButtonId", buttonElement.id);

        // Update topbar breadcrumb
        const topbarTitle = document.getElementById("topbarPageTitle");
        if (topbarTitle)
          topbarTitle.textContent =
            PAGE_TITLES[pageUrl] || pageUrl.replace(".html", "");

        // Update UI immediately (no delay)
        document.querySelectorAll(".sidebar-item").forEach((btn) => {
          btn.classList.remove("active");
          btn.removeAttribute("aria-current");
        });
        buttonElement.classList.add("active");
        buttonElement.setAttribute("aria-current", "page");

        // Ensure active item is visible in the list
        try {
          buttonElement.scrollIntoView({
            block: "nearest",
            behavior: "smooth",
          });
        } catch {}

        // Close sidebar on mobile
        if (window.innerWidth < 768) {
          closeSidebar();
        }

        // Load page with language parameter
        const lang = localStorage.getItem("lang") || "en";
        const url = new URL(pageUrl, window.location.href);
        url.searchParams.set("lang", lang);

        // Cancel any in-flight navigation (rapid clicks) before starting a new one
        clearTimeout(_navTimer);
        iframe.onload = null;

        // Fade out → swap src → fade in (fix #37 flicker)
        iframe.classList.add("loading");

        // Wait for the CSS fade-out (200ms) before swapping src so the old
        // content is fully invisible when the blank document briefly appears.
        const FADE_MS = 200;
        _navTimer = setTimeout(() => {
          iframe.src = url.toString();

          // Capture the nav sequence so a stale onload from a previous
          // navigation cannot accidentally show/hide the wrong state.
          const navSrc = url.toString();

          iframe.onload = function () {
            // Guard: ignore if another navigation already changed src
            if (iframe.src !== navSrc) return;

            const isDark = document.documentElement.classList.contains("dark");

            try {
              const iframeDoc =
                iframe.contentDocument || iframe.contentWindow.document;

              // Apply dark mode
              if (isDark) {
                iframeDoc.documentElement.classList.add("dark");
              }

              // Also force-set language inside the iframe in case the page ignores ?lang
              try {
                const iw = iframe.contentWindow;
                if (
                  iw &&
                  iw.I18N &&
                  typeof iw.I18N.setLanguage === "function"
                ) {
                  iw.I18N.setLanguage(lang).catch(() => {});
                }
              } catch {}
            } catch (e) {
              console.error("Error setting iframe properties:", e);
            }

            // Fade the new page in
            iframe.classList.remove("loading");

            // Haptic feedback
            if (navigator.vibrate) {
              navigator.vibrate(15);
            }
          };
        }, FADE_MS);
      }

      // Dark mode functionality
      document.addEventListener("DOMContentLoaded", function () {
        const darkModeToggle = document.getElementById("darkModeToggle");
        const darkModeIndicator = document.getElementById("darkModeIndicator");
        const html = document.documentElement;
        const iframe = document.getElementById("iframe");
        const sidebar = document.getElementById("sidebar");
        const langSelectGlobal = document.getElementById("langSelectGlobal");

        // Helper: load a page by url+buttonId and apply iframe dark mode + lang
        function _applyIframeDefaults() {
          const lang = localStorage.getItem("lang") || "en";
          iframe.onload = function () {
            try {
              if (document.documentElement.classList.contains("dark")) {
                const idoc =
                  iframe.contentDocument || iframe.contentWindow.document;
                idoc?.documentElement?.classList?.add("dark");
              }
              try {
                const iw = iframe.contentWindow;
                if (
                  iw &&
                  iw.I18N &&
                  typeof iw.I18N.setLanguage === "function"
                ) {
                  iw.I18N.setLanguage(lang).catch(() => {});
                }
              } catch {}
            } catch {}
          };
          return lang;
        }

        function _activateButton(btn) {
          document.querySelectorAll(".sidebar-item").forEach((b) => {
            b.classList.remove("active");
            b.removeAttribute("aria-current");
          });
          btn.classList.add("active");
          btn.setAttribute("aria-current", "page");
          try {
            btn.scrollIntoView({ block: "nearest" });
          } catch {}
        }

        function _loadByPageUrl(pageUrl, buttonId) {
          const btn = document.getElementById(buttonId);
          if (!btn) return false;
          _activateButton(btn);
          // Update topbar breadcrumb
          const topbarTitle = document.getElementById("topbarPageTitle");
          if (topbarTitle)
            topbarTitle.textContent =
              PAGE_TITLES[pageUrl] || pageUrl.replace(".html", "");
          const lang = _applyIframeDefaults();
          const url = new URL(pageUrl, window.location.href);
          url.searchParams.set("lang", lang);
          iframe.src = url.toString();
          return true;
        }

        // popstate — browser back/forward
        window.addEventListener("popstate", function (e) {
          const hash = location.hash;
          const entry = PAGE_MAP[hash];
          if (entry) {
            _loadByPageUrl(entry.url, entry.buttonId);
            localStorage.setItem("lastPage", entry.url);
            localStorage.setItem("lastButtonId", entry.buttonId);
          }
        });

        // Restore last active page — hash wins over localStorage - OPTIMIZED
        (function restoreLastPage() {
          // 1. Try URL hash first (shared link / browser back)
          const hashEntry = PAGE_MAP[location.hash];
          if (hashEntry) {
            _loadByPageUrl(hashEntry.url, hashEntry.buttonId);
            localStorage.setItem("lastPage", hashEntry.url);
            localStorage.setItem("lastButtonId", hashEntry.buttonId);
            return;
          }

          // 2. Fall back to localStorage
          const lastPage = localStorage.getItem("lastPage");
          const lastButtonId = localStorage.getItem("lastButtonId");

          if (lastPage && lastButtonId) {
            if (_loadByPageUrl(lastPage, lastButtonId)) {
              // Push hash so the address bar reflects the restored page
              const restoredHash = URL_TO_HASH[lastPage];
              if (restoredHash)
                history.replaceState(
                  { pageUrl: lastPage, buttonId: lastButtonId },
                  "",
                  restoredHash,
                );
              return;
            }
          }

          // 3. Default: load ISA
          const lang = localStorage.getItem("lang") || "en";
          const url = new URL("ISA_deviation.html", window.location.href);
          url.searchParams.set("lang", lang);
          iframe.onload = function () {
            try {
              if (document.documentElement.classList.contains("dark")) {
                const idoc =
                  iframe.contentDocument || iframe.contentWindow.document;
                idoc?.documentElement?.classList?.add("dark");
              }
              // Force-set language inside the iframe as an extra safeguard
              try {
                const iw = iframe.contentWindow;
                if (
                  iw &&
                  iw.I18N &&
                  typeof iw.I18N.setLanguage === "function"
                ) {
                  iw.I18N.setLanguage(lang).catch(() => {});
                }
              } catch {}
            } catch {}
          };
          iframe.src = url.toString();
        })(); // Dark mode - OPTIMIZED
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;

        // Apply initial theme
        if (savedTheme === "dark" || (!savedTheme && prefersDark)) {
          html.classList.add("dark");
          darkModeIndicator.style.transform = "translateX(100%)";
        }

        // Toggle dark mode
        darkModeToggle.addEventListener("click", function () {
          const isDark = html.classList.toggle("dark");
          // Phase 8 — icon spin animation
          darkModeToggle.classList.add("dark-toggle-animating");
          setTimeout(function () {
            darkModeToggle.classList.remove("dark-toggle-animating");
          }, 430);
          darkModeIndicator.style.transform = isDark
            ? "translateX(100%)"
            : "translateX(0)";
          localStorage.setItem("theme", isDark ? "dark" : "light");

          // Apply to iframe immediately
          try {
            const iframeDoc =
              iframe.contentDocument || iframe.contentWindow.document;
            if (iframeDoc?.documentElement) {
              if (isDark) {
                iframeDoc.documentElement.classList.add("dark");
              } else {
                iframeDoc.documentElement.classList.remove("dark");
              }
            }
          } catch (e) {}

          // Haptic feedback
          if (navigator.vibrate) {
            navigator.vibrate(20);
          }
        });

        // Initialize and handle language changes globally - OPTIMIZED
        (function initLanguage() {
          const savedLang = localStorage.getItem("lang") || "en";

          if (langSelectGlobal) {
            langSelectGlobal.value = savedLang;
            langSelectGlobal.addEventListener("change", function (e) {
              const lang = e.target.value;
              localStorage.setItem("lang", lang);

              // Update Main shell translations immediately
              try {
                if (window.I18N && typeof I18N.setLanguage === "function") {
                  I18N.setLanguage(lang).catch(console.error);
                }
              } catch (e) {}

              // Simply reload the iframe with new lang parameter
              const currentSrc = iframe.src;
              const url = new URL(currentSrc);
              url.searchParams.set("lang", lang);
              // Assign new URL and also set language after load to ensure immediate update
              iframe.onload = function () {
                try {
                  const iw = iframe.contentWindow;
                  if (
                    iw &&
                    iw.I18N &&
                    typeof iw.I18N.setLanguage === "function"
                  ) {
                    iw.I18N.setLanguage(lang).catch(() => {});
                  }
                } catch {}
              };
              iframe.src = url.toString();

              // Haptic feedback
              if (navigator.vibrate) {
                navigator.vibrate(10);
              }
            });
          }
        })();

        // Sync mobile header controls with topbar equivalents
        (function syncMobileControls() {
          const darkModeToggleMobile = document.getElementById(
            "darkModeToggleMobile",
          );
          const langSelectMobile = document.getElementById("langSelectMobile");
          if (darkModeToggleMobile) {
            darkModeToggleMobile.addEventListener("click", function () {
              darkModeToggle.click();
            });
          }
          if (langSelectMobile) {
            langSelectMobile.value = localStorage.getItem("lang") || "en";
            langSelectMobile.addEventListener("change", function (e) {
              if (langSelectGlobal) {
                langSelectGlobal.value = e.target.value;
                langSelectGlobal.dispatchEvent(new Event("change"));
              }
            });
          }
        })();

        // Sidebar scroll shadows
        function updateSidebarShadows() {
          try {
            const atTop = sidebar.scrollTop <= 0;
            const atBottom =
              Math.ceil(sidebar.scrollTop + sidebar.clientHeight) >=
              sidebar.scrollHeight;
            sidebar.classList.toggle("shadow-top", !atTop);
            sidebar.classList.toggle("shadow-bottom", !atBottom);
          } catch {}
        }
        if (sidebar) {
          sidebar.addEventListener("scroll", updateSidebarShadows, {
            passive: true,
          });
          // Initial state after content settles
          setTimeout(updateSidebarShadows, 50);
        }
      });

      // Prevent iframe content from scrolling the main page on tablets
      document.addEventListener("DOMContentLoaded", function () {
        const iframe = document.getElementById("iframe");

        iframe.addEventListener("load", function () {
          try {
            const iframeDoc =
              iframe.contentDocument || iframe.contentWindow.document;

            // Prevent touchmove events from propagating to parent
            iframeDoc.addEventListener(
              "touchmove",
              function (e) {
                e.stopPropagation();
              },
              { passive: true },
            );
          } catch (e) {
            console.error("Error setting up iframe touch handling:", e);
          }
        });
      });

      // =====================================================
      // Phase 10 — Sidebar Collapse + Section Accordion
      // =====================================================
      document.addEventListener("DOMContentLoaded", function () {
        var sidebar = document.getElementById("sidebar");
        var collapseBtn = document.getElementById("sidebarCollapseBtn");
        var chevronIcon = collapseBtn
          ? collapseBtn.querySelector(".chevron-icon")
          : null;

        // ── 10.1 Restore sidebar rail state ──────────────────
        var isExpanded = localStorage.getItem("sidebarExpanded") !== "false";
        if (!isExpanded && sidebar) {
          sidebar.classList.add("rail");
        }
        if (chevronIcon && !isExpanded) {
          chevronIcon.style.transform = "rotate(180deg)";
        }

        // ── 10.5 Collapse button click ────────────────────────
        if (collapseBtn && sidebar) {
          collapseBtn.addEventListener("click", function () {
            var nowRail = sidebar.classList.toggle("rail");
            localStorage.setItem("sidebarExpanded", String(!nowRail));
            if (chevronIcon) {
              chevronIcon.style.transform = nowRail ? "rotate(180deg)" : "";
            }
            collapseBtn.setAttribute(
              "aria-label",
              nowRail ? "Expand sidebar" : "Collapse sidebar",
            );
          });
        }

        // ── 10.3 Section accordion ────────────────────────────
        document
          .querySelectorAll(".section-header[data-section]")
          .forEach(function (header) {
            var sectionName = header.getAttribute("data-section");
            var group = document.querySelector(
              ".section-group[data-for='" + sectionName + "']",
            );
            if (!group) return;

            // Restore collapsed state
            var isCollapsed =
              localStorage.getItem("section-" + sectionName + "-collapsed") ===
              "true";
            if (isCollapsed) {
              header.classList.add("collapsed");
              group.classList.add("collapsed");
            }

            header.addEventListener("click", function () {
              // Don't collapse sections while in rail mode (icons need to stay visible)
              if (sidebar && sidebar.classList.contains("rail")) return;

              var nowCollapsed = header.classList.toggle("collapsed");
              group.classList.toggle("collapsed", nowCollapsed);
              localStorage.setItem(
                "section-" + sectionName + "-collapsed",
                String(nowCollapsed),
              );
            });
          });
      });
      // END PHASE 10
    </script>
  </body>
</html>
