<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="profile.title">Profile Estimator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="shared-config.js"></script>
    <link rel="stylesheet" href="dark-mode.css" />
    <script src="aviation-utils.js"></script>
    <script src="i18n/i18n.js"></script>
  </head>
  <body
    class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center p-4"
  >
    <main
      class="max-w-4xl w-full mx-auto p-6 bg-white dark:bg-gray-800 shadow-lg rounded-xl border border-gray-200 dark:border-gray-700"
    >
      <header>
        <h1
          class="text-2xl sm:text-3xl font-bold text-primary-700 dark:text-primary-300 mb-6 flex items-center"
        >
          <svg
            aria-hidden="true"
            focusable="false"
            xmlns="http://www.w3.org/2000/svg"
            class="h-7 w-7 sm:h-8 sm:w-8 mr-2"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M2 12h20M2 12l10-10M2 12l10 10"></path>
          </svg>
          <span data-i18n="profile.title">Profile Estimator</span>
        </h1>
      </header>

      <!-- Load/Save Parameters -->
      <div class="flex flex-wrap justify-between items-center mb-6 gap-3">
        <label
          for="loadFile"
          class="text-gray-700 dark:text-gray-300 font-medium"
          data-i18n="rateTurn.loadParamsFile"
        >
          Load Parameters File (JSON)
        </label>
        <div class="flex gap-3 flex-wrap">
          <button
            type="button"
            id="btnSave"
            class="bg-green-600 hover:bg-green-700 dark:bg-green-700 dark:hover:bg-green-800 text-white font-medium py-2 px-4 rounded-lg shadow transition-colors flex items-center text-sm"
          >
            <svg
              aria-hidden="true"
              focusable="false"
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 mr-1"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"
              ></path>
              <polyline points="17 21 17 13 7 13 7 21"></polyline>
              <polyline points="7 3 7 8 15 8"></polyline>
            </svg>
            <span data-i18n="common.save">Save Parameters</span>
          </button>
          <input id="loadFile" type="file" accept=".json" class="hidden" />
          <button
            type="button"
            id="btnLoad"
            class="bg-primary-600 hover:bg-primary-700 dark:bg-primary-700 dark:hover:bg-primary-800 text-white font-medium py-2 px-4 rounded-lg shadow transition-colors flex items-center text-sm"
          >
            <svg
              aria-hidden="true"
              focusable="false"
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 mr-1"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span data-i18n="common.load">Load Parameters</span>
          </button>
        </div>
      </div>

      <!-- Row 1: THR Elevation and TCH -->
      <fieldset>
        <legend class="sr-only">Threshold Parameters</legend>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
          <!-- THR Elevation -->
          <div class="space-y-2">
            <label
              for="thrElev"
              class="block font-medium text-gray-700 dark:text-gray-300"
              data-i18n="profile.thrElev"
              >THR Elev (ft)</label
            >
            <div
              class="flex rounded-lg overflow-hidden shadow-sm border border-gray-300 dark:border-gray-600"
            >
              <input
                id="thrElev"
                type="number"
                class="flex-grow p-3 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
                placeholder="Enter THR Elev"
              />
              <select
                id="thrElevUnit"
                class="bg-gray-100 dark:bg-gray-600 px-3 py-2 border-l border-gray-300 dark:border-gray-600 focus:outline-none dark:text-white"
              >
                <option value="ft" selected data-i18n="common.feet">ft</option>
                <option value="m" data-i18n="common.meters">m</option>
              </select>
            </div>
          </div>
          <!-- TCH -->
          <div class="space-y-2">
            <label
              for="tch"
              class="block font-medium text-gray-700 dark:text-gray-300"
              data-i18n="profile.tch"
              >TCH (ft)</label
            >
            <div
              class="flex rounded-lg overflow-hidden shadow-sm border border-gray-300 dark:border-gray-600"
            >
              <input
                id="tch"
                type="number"
                class="flex-grow p-3 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
                placeholder="Enter TCH"
              />
              <select
                id="tchUnit"
                class="bg-gray-100 dark:bg-gray-600 px-3 py-2 border-l border-gray-300 dark:border-gray-600 focus:outline-none dark:text-white"
              >
                <option value="ft" selected data-i18n="common.feet">ft</option>
                <option value="m" data-i18n="common.meters">m</option>
              </select>
            </div>
          </div>
        </div>
      </fieldset>

      <!-- Row 2: VPA, Distance to FAF, Intermediate Length, Initial Length -->
      <fieldset>
        <legend class="sr-only">Approach Geometry</legend>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
          <!-- VPA -->
          <div class="space-y-2">
            <label
              for="vpa"
              class="block font-medium text-gray-700 dark:text-gray-300"
              data-i18n="profile.vpa"
              >VPA (Â°)</label
            >
            <input
              id="vpa"
              type="number"
              step="0.01"
              class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
              placeholder="Enter VPA"
            />
          </div>
          <!-- Distance to FAF -->
          <div class="space-y-2">
            <label
              for="distToFaf"
              class="block font-medium text-gray-700 dark:text-gray-300"
              data-i18n="profile.distToFaf"
              >Distance to FAF (NM)</label
            >
            <input
              id="distToFaf"
              type="number"
              class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
              placeholder="Enter Distance to FAF"
            />
          </div>
          <!-- Intermediate Length -->
          <div class="space-y-2">
            <label
              for="intermediateLength"
              class="block font-medium text-gray-700 dark:text-gray-300"
              data-i18n="profile.intermediateLength"
              >Intermediate Length (NM)</label
            >
            <input
              id="intermediateLength"
              type="number"
              class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
              placeholder="Enter Intermediate Length"
            />
          </div>
          <!-- Initial Length -->
          <div class="space-y-2">
            <label
              for="initialLength"
              class="block font-medium text-gray-700 dark:text-gray-300"
              data-i18n="profile.initialLength"
              >Initial Length (NM)</label
            >
            <input
              id="initialLength"
              type="number"
              class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
              placeholder="Enter Initial Length"
            />
          </div>
        </div>
      </fieldset>

      <!-- Calculate Button -->
      <div class="flex justify-end mt-6">
        <button
          type="button"
          id="btnCalculate"
          class="bg-primary-600 hover:bg-primary-700 dark:bg-primary-700 dark:hover:bg-primary-800 text-white font-medium py-3 px-6 rounded-lg shadow transition-colors flex items-center"
        >
          <svg
            aria-hidden="true"
            focusable="false"
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 mr-2"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
          <span data-i18n="common.calculate">Calculate</span>
        </button>
      </div>

      <!-- Results and SVG Diagram -->
      <div
        id="results"
        role="region"
        aria-live="polite"
        aria-atomic="true"
        class="mt-8 hidden bg-green-50 dark:bg-gray-700 p-6 rounded-xl border border-green-200 dark:border-gray-600"
      >
        <h2
          class="text-xl font-bold text-green-800 dark:text-green-300 mb-4"
          data-i18n="profile.resultsTitle"
        >
          Profile Results
        </h2>

        <!-- Output values in a grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
          <div
            class="bg-white dark:bg-gray-800 p-3 rounded-lg border border-green-100 dark:border-gray-600 shadow-sm"
          >
            <p
              class="text-sm text-gray-500 dark:text-gray-400"
              data-i18n="profile.thrElev"
            >
              THR Elev (ft)
            </p>
            <p class="text-lg font-semibold dark:text-white">
              <span id="outputThrElev"></span> ft
            </p>
          </div>
          <div
            class="bg-white dark:bg-gray-800 p-3 rounded-lg border border-green-100 dark:border-gray-600 shadow-sm"
          >
            <p
              class="text-sm text-gray-500 dark:text-gray-400"
              data-i18n="profile.tch"
            >
              TCH (ft)
            </p>
            <p class="text-lg font-semibold dark:text-white">
              <span id="outputTch"></span> ft
            </p>
          </div>
          <div
            class="bg-white dark:bg-gray-800 p-3 rounded-lg border border-green-100 dark:border-gray-600 shadow-sm"
          >
            <p
              class="text-sm text-gray-500 dark:text-gray-400"
              data-i18n="profile.fafElevation"
            >
              FAF Elevation (ft)
            </p>
            <p class="text-lg font-semibold dark:text-white">
              <span id="fafElevation"></span> ft
            </p>
          </div>
          <div
            class="bg-white dark:bg-gray-800 p-3 rounded-lg border border-green-100 dark:border-gray-600 shadow-sm"
          >
            <p
              class="text-sm text-gray-500 dark:text-gray-400"
              data-i18n="profile.intermediateElevation"
            >
              Intermediate Elevation (ft)
            </p>
            <p class="text-lg font-semibold dark:text-white">
              <span id="intermediateElevation"></span> ft
            </p>
          </div>
          <div
            class="bg-white dark:bg-gray-800 p-3 rounded-lg border border-green-100 dark:border-gray-600 shadow-sm"
          >
            <p
              class="text-sm text-gray-500 dark:text-gray-400"
              data-i18n="profile.initialElevation"
            >
              Initial Elevation (ft)
            </p>
            <p class="text-lg font-semibold dark:text-white">
              <span id="initialElevation"></span> ft
            </p>
          </div>
        </div>

        <!-- SVG Profile Diagram -->
        <div class="mt-6">
          <h3
            class="font-medium text-gray-700 dark:text-gray-300 mb-2"
            data-i18n="profile.diagramTitle"
          >
            Profile Diagram:
          </h3>
          <div
            class="bg-white dark:bg-gray-800 p-4 rounded-lg border border-gray-200 dark:border-gray-600 shadow-sm overflow-auto"
          >
            <svg
              id="profileSvg"
              width="100%"
              height="400"
              viewBox="-20 0 520 400"
              xmlns="http://www.w3.org/2000/svg"
              class="mx-auto dark:text-white"
            >
              <!-- Polyline for profile -->
              <polyline
                id="profilePolyline"
                points=""
                stroke="#0284c7"
                class="dark:stroke-blue-400"
                stroke-width="3"
                fill="none"
              />
              <!-- Group for all grid lines, vertical markers, and annotations -->
              <g id="profileAnnotations"></g>
            </svg>
          </div>
        </div>

        <div class="mt-6 flex justify-end">
          <button
            type="button"
            id="btnCopy"
            class="bg-green-600 hover:bg-green-700 dark:bg-green-700 dark:hover:bg-green-800 text-white font-medium py-2 px-4 rounded-lg shadow transition-colors flex items-center"
          >
            <svg
              aria-hidden="true"
              focusable="false"
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 mr-2"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
              ></path>
              <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
            </svg>
            <span data-i18n="common.copyToWord">Copy to Word Document</span>
          </button>
        </div>
      </div>
    </main>

    <script src="js/profile_check.js"></script>
  </body>
</html>
