<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />
    <title data-i18n="faf.title">FAF Estimator</title>
    <link rel="stylesheet" href="css/tailwind.css" />
    <script src="js/shared/shared-config.js" defer></script>
    <link rel="stylesheet" href="css/dark-mode.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script src="js/shared/aviation-utils.js" defer></script>
    <script src="i18n/i18n.js" defer></script>
    <style>
      .faf-table thead th {
        position: sticky;
        top: 0;
        z-index: 1;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center p-4"
  >
    <main
      class="max-w-4xl w-full mx-auto p-6 bg-white dark:bg-gray-800 shadow-lg rounded-xl border border-gray-200 dark:border-gray-700"
    >
      <header>
        <h1
          class="text-2xl sm:text-3xl font-bold text-primary-700 dark:text-primary-300 mb-6 flex items-center"
        >
          <svg
            aria-hidden="true"
            focusable="false"
            xmlns="http://www.w3.org/2000/svg"
            class="h-7 w-7 sm:h-8 sm:w-8 mr-2 shrink-0"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 20L20 5" />
            <circle cx="12" cy="12" r="2.5" />
            <path d="M12 14.5V20" stroke-dasharray="2 2" />
          </svg>
          <span data-i18n="faf.title">FAF Estimator</span>
        </h1>
      </header>

      <!-- Inputs -->
      <fieldset>
        <legend class="sr-only">Approach Parameters</legend>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">

          <!-- THR -->
          <div class="space-y-2">
            <label
              for="thr"
              class="block font-medium text-gray-700 dark:text-gray-300"
              data-i18n="faf.thr"
            >THR Elevation</label>
            <div
              class="flex rounded-lg overflow-hidden shadow-sm border border-gray-300 dark:border-gray-600"
            >
              <input
                id="thr"
                type="number"
                step="any"
                class="flex-grow p-3 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
                placeholder="e.g. 2062"
              />
              <select
                id="thrUnit"
                class="bg-gray-100 dark:bg-gray-600 px-3 py-2 border-l border-gray-300 dark:border-gray-600 focus:outline-none text-sm text-gray-700 dark:text-white"
                aria-label="THR unit"
              >
                <option value="ft" selected data-i18n="common.feet">ft</option>
                <option value="m" data-i18n="common.meters">m</option>
              </select>
            </div>
          </div>

          <!-- RDH -->
          <div class="space-y-2">
            <label
              for="rdh"
              class="block font-medium text-gray-700 dark:text-gray-300"
              data-i18n="faf.rdh"
            >RDH</label>
            <div
              class="flex rounded-lg overflow-hidden shadow-sm border border-gray-300 dark:border-gray-600"
            >
              <input
                id="rdh"
                type="number"
                step="any"
                class="flex-grow p-3 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
                placeholder="e.g. 15"
              />
              <select
                id="rdhUnit"
                class="bg-gray-100 dark:bg-gray-600 px-3 py-2 border-l border-gray-300 dark:border-gray-600 focus:outline-none text-sm text-gray-700 dark:text-white"
                aria-label="RDH unit"
              >
                <option value="m" selected data-i18n="common.meters">m</option>
                <option value="ft" data-i18n="common.feet">ft</option>
              </select>
            </div>
          </div>

          <!-- VPA -->
          <div class="space-y-2">
            <label
              for="vpa"
              class="block font-medium text-gray-700 dark:text-gray-300"
              data-i18n="faf.vpa"
            >VPA (°)</label>
            <input
              id="vpa"
              type="number"
              step="0.01"
              class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
              placeholder="e.g. 3.00"
            />
          </div>

          <!-- Empty column for visual balance -->
          <div></div>

          <!-- Lower value -->
          <div class="space-y-2">
            <label
              for="lowerValue"
              class="block font-medium text-gray-700 dark:text-gray-300"
              data-i18n="faf.lowerValue"
            >Lower limit (°)</label>
            <input
              id="lowerValue"
              type="number"
              step="0.01"
              value="2.95"
              class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
            />
            <p class="text-xs text-gray-500 dark:text-gray-400" data-i18n="faf.lowerHint">Auto-fills to VPA − 0.05</p>
          </div>

          <!-- Upper value -->
          <div class="space-y-2">
            <label
              for="upperValue"
              class="block font-medium text-gray-700 dark:text-gray-300"
              data-i18n="faf.upperValue"
            >Upper limit (°)</label>
            <input
              id="upperValue"
              type="number"
              step="0.01"
              value="3.05"
              class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
            />
            <p class="text-xs text-gray-500 dark:text-gray-400" data-i18n="faf.upperHint">Auto-fills to VPA + 0.05</p>
          </div>

        </div>
      </fieldset>

      <!-- Calculate button -->
      <div class="flex justify-end mt-4">
        <button
          id="btnCalculate"
          type="button"
          class="bg-primary-600 hover:bg-primary-700 dark:bg-primary-700 dark:hover:bg-primary-800 text-white font-medium py-3 px-6 rounded-lg shadow transition-colors flex items-center"
        >
          <svg
            aria-hidden="true"
            focusable="false"
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 mr-2"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
          <span data-i18n="common.calculate">Calculate</span>
        </button>
      </div>

      <!-- Results section (hidden until first calculation) -->
      <section
        id="resultsSection"
        class="hidden mt-2 bg-green-50 dark:bg-gray-700 p-6 rounded-xl border border-green-200 dark:border-gray-600"
        aria-live="polite"
      >
        <!-- Heading -->
        <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
          <h2 class="text-xl font-bold text-green-800 dark:text-green-300 flex items-center gap-2">
            <span data-i18n="faf.resultsTitle">FAF Altitude Table</span>
            <span
              id="summaryCount"
              class="inline-flex items-center justify-center bg-primary-600 dark:bg-primary-700 text-white text-sm font-bold px-2.5 py-0.5 rounded-full min-w-[1.75rem]"
            >—</span>
            <span class="text-sm font-normal text-green-700 dark:text-green-400" data-i18n="faf.usableLabel">usable</span>
          </h2>

          <!-- Filter pill toggle -->
          <div
            class="flex rounded-lg overflow-hidden border border-gray-300 dark:border-gray-500 text-sm shadow-sm"
            role="group"
            aria-label="Filter results"
          >
            <button
              id="btnFilterAll"
              type="button"
              class="px-4 py-2 bg-primary-600 dark:bg-primary-700 text-white font-semibold transition-colors"
              data-i18n="faf.showAll"
            >Show All</button>
            <button
              id="btnFilterUsable"
              type="button"
              class="px-4 py-2 bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors border-l border-gray-300 dark:border-gray-500"
              data-i18n="faf.usableOnly"
            >Usable Only</button>
            <button
              id="btnFilterNotUsable"
              type="button"
              class="px-4 py-2 bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors border-l border-gray-300 dark:border-gray-500"
              data-i18n="faf.notUsableOnly"
            >Not Usable Only</button>
          </div>
        </div>

        <!-- Summary cards -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-5">
          <div class="bg-white dark:bg-gray-800 p-3 rounded-lg border border-green-100 dark:border-gray-600 shadow-sm">
            <p class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1" data-i18n="faf.distRange">Distance range</p>
            <p class="text-base font-semibold text-gray-800 dark:text-white"><span id="summaryDistRange">—</span></p>
          </div>
          <div class="bg-white dark:bg-gray-800 p-3 rounded-lg border border-green-100 dark:border-gray-600 shadow-sm">
            <p class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1" data-i18n="faf.vpaTolerance">VPA tolerance</p>
            <p class="text-base font-semibold text-gray-800 dark:text-white"><span id="summaryVpaTolerance">—</span></p>
          </div>
          <div class="bg-white dark:bg-gray-800 p-3 rounded-lg border border-green-100 dark:border-gray-600 shadow-sm">
            <p class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1" data-i18n="faf.distStep">Distance step</p>
            <p class="text-base font-semibold text-gray-800 dark:text-white">0.1 NM (3.0 – 10.0)</p>
          </div>
        </div>

        <!-- Table -->
        <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-600 shadow-sm overflow-hidden">
          <div class="overflow-y-auto max-h-[480px]">
            <table class="w-full faf-table" aria-label="FAF altitude estimation results">
              <thead class="bg-gray-50 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-600">
                <tr>
                  <th scope="col" class="px-4 py-3 text-center text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider" data-i18n="faf.colDist">Dist (NM)</th>
                  <th scope="col" id="thExact" class="px-4 py-3 text-right text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider cursor-pointer hover:text-primary-500 dark:hover:text-primary-400 hover:bg-gray-100 dark:hover:bg-gray-600 select-none transition-colors rounded">
                    <span class="inline-flex items-center justify-end gap-1">
                      <span data-i18n="faf.colExact">Exact Alt (ft)</span>
                      <span id="sortIconExact"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 opacity-50" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="4,7 8,3 12,7"/><polyline points="4,9 8,13 12,9"/></svg></span>
                    </span>
                  </th>
                  <th scope="col" id="thRounded" class="px-4 py-3 text-right text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider cursor-pointer hover:text-primary-500 dark:hover:text-primary-400 hover:bg-gray-100 dark:hover:bg-gray-600 select-none transition-colors rounded">
                    <span class="inline-flex items-center justify-end gap-1">
                      <span data-i18n="faf.colRounded">Rounded (ft)</span>
                      <span id="sortIconRounded"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 opacity-50" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="4,7 8,3 12,7"/><polyline points="4,9 8,13 12,9"/></svg></span>
                    </span>
                  </th>
                  <th scope="col" id="thBackVpa" class="px-4 py-3 text-right text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider cursor-pointer hover:text-primary-500 dark:hover:text-primary-400 hover:bg-gray-100 dark:hover:bg-gray-600 select-none transition-colors rounded">
                    <span class="inline-flex items-center justify-end gap-1">
                      <span data-i18n="faf.colBackVpa">Back VPA (°)</span>
                      <span id="sortIconBackVpa"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 opacity-50" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="4,7 8,3 12,7"/><polyline points="4,9 8,13 12,9"/></svg></span>
                    </span>
                  </th>
                  <th scope="col" class="px-4 py-3 text-center text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider" data-i18n="faf.colUsable">Usable</th>
                </tr>
              </thead>
              <tbody id="fafTableBody" class="divide-y divide-gray-100 dark:divide-gray-700">
                <!-- Rows injected by JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Copy to Word -->
        <div class="mt-5 flex justify-end">
          <button
            id="btnCopy"
            type="button"
            class="bg-gray-700 hover:bg-gray-800 dark:bg-gray-600 dark:hover:bg-gray-500 text-white font-medium py-2 px-5 rounded-lg shadow transition-colors flex items-center gap-2 text-sm"
          >
            <svg
              aria-hidden="true"
              focusable="false"
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            <span data-i18n="common.copyToWord">Copy to Word Document</span>
          </button>
        </div>
      </section>
    </main>

    <script src="js/faf_estimator.js" defer></script>
  </body>
</html>
